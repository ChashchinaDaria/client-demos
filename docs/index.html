<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<meta name="yandex" content="noindex, nofollow, noarchive">
<meta name="referrer" content="no-referrer">
<title>Персональные демонстрационные проекты</title>
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --text: #1c1c1a;
    --muted: #6b6b66;
    --line: #e3e3df;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131312;
      --surface: #1c1c1a;
      --text: #ededea;
      --muted: #9a9a94;
      --line: #2e2e2b;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  main {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .mark {
    width: 34px;
    height: 34px;
    margin: 0 auto 22px;
    border: 1.5px solid var(--muted);
    border-radius: 8px;
    opacity: 0.5;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin: 0 0 14px;
  }
  p {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 0;
  }
  .divider {
    height: 1px;
    background: var(--line);
    margin: 26px 0 18px;
  }
  .note {
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.75;
  }
  @media (max-width: 420px) {
    main { padding: 32px 22px; }
    h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
    <h1>Персональные демонстрационные проекты</h1>
    <p>Для просмотра используйте предоставленную индивидуальную ссылку.</p>
    <div class="divider"></div>
    <p class="note">Страница не индексируется и не содержит публичного каталога.</p>
  </main>
</body>
</html>
